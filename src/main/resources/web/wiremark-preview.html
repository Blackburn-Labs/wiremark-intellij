<!DOCTYPE html>
<!--
  Split-editor preview shell for *.wiremark files (dev2).
  The Kotlin side (WiremarkPreviewHtml) inlines the wiremark core bundle and
  wiremark-preview.js into this document before handing it to JBCefBrowser.loadHTML,
  so the two placeholder comments below are replaced at load time. Loading it
  directly in a normal browser (without that inlining) renders an empty shell.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src data:;">
  <style id="wiremark-base-style">
    /* Structural shell rules only. The diagnostics/error/host styling is shared
       with the markdown preview and lives in wiremark-ui.css, inlined at the
       WIREMARK_UI_CSS placeholder below by WiremarkPreviewHtml. */
    :root { color-scheme: light dark; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #wiremark-root {
      box-sizing: border-box;
      min-height: 100%;
      padding: 12px;
    }
    #wiremark-placeholder {
      opacity: 0.55;
      font-size: 12px;
      padding: 4px 0;
    }
    /* WIREMARK_UI_CSS */
  </style>
</head>
<body>
  <div id="wiremark-root">
    <div id="wiremark-error" class="wiremark-error" role="alert"></div>
    <!-- Carries class="wiremark-host" so the shared paper-card styling (white
         card under the self-contained SVG) applies on this surface too. -->
    <div id="wiremark-host" class="wiremark-host"></div>
    <div id="wiremark-diagnostics"></div>
    <div id="wiremark-placeholder">Wiremark preview &mdash; start typing to render.</div>
  </div>
  <!-- WIREMARK_BUNDLE -->
  <!-- WIREMARK_UI_JS -->
  <!-- WIREMARK_PREVIEW_JS -->
</body>
</html>
